spring:
  application:
    name: libraryapi
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/library?sslmode=disable
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        boot:
          allow_jdbc_metadata_access: false
        hibernate.format_sql: true